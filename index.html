<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>手机声控提词器</title>
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --accent: #3b82f6;
            --danger: #ef4444;
            --panel-bg: rgba(20, 20, 20, 0.95);
            --header-bg: rgba(0,0,0,0.8);
            --border-dashed: #555;
            --edit-bg: rgba(255,255,255,0.05);
            --btn-icon-bg: #333;
            --btn-icon-color: #fff;
            --range-bg: #444;
            --range-thumb: #fff;
            --setting-label: #aaa;
            --floater-bg: rgba(255,255,255,0.2);
            --right-btn-bg: rgba(255,255,255,0.15);
            --right-btn-active: rgba(255,255,255,0.35);
            --speed-track-bg: rgba(255,255,255,0.25);
            --speed-thumb: #fff;
            --tooltip-bg: rgba(0,0,0,0.7);
            --guide-text: rgba(255,0,0,0.6);
            --guide-line: rgba(255, 0, 0, 0.4);
        }

        body.light-mode {
            --bg: #ffffff;
            --text: #000000;
            --panel-bg: rgba(245, 245, 245, 0.98);
            --header-bg: rgba(255,255,255,0.9);
            --border-dashed: #bbb;
            --edit-bg: rgba(0,0,0,0.03);
            --btn-icon-bg: #e5e5e5;
            --btn-icon-color: #000;
            --range-bg: #ccc;
            --range-thumb: #000;
            --setting-label: #666;
            --floater-bg: rgba(0,0,0,0.15);
            --right-btn-bg: rgba(0,0,0,0.1);
            --right-btn-active: rgba(0,0,0,0.25);
            --speed-track-bg: rgba(0,0,0,0.2);
            --speed-thumb: #000;
            --tooltip-bg: rgba(0,0,0,0.75);
            --guide-text: rgba(200,0,0,0.8);
            --guide-line: rgba(255, 0, 0, 0.5);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            margin: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 顶部栏 */
        header {
            padding: 10px 15px;
            padding-top: max(10px, env(safe-area-inset-top));
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--header-bg);
            z-index: 50;
            position: fixed;
            top: 0;
            width: 100%;
            backdrop-filter: blur(5px);
            transition: transform 0.3s ease;
        }
        .brand { font-weight: bold; font-size: 16px; display: flex; align-items: center; gap: 5px; }
        .status-dot { width: 8px; height: 8px; background: #555; border-radius: 50%; }
        .status-dot.active { background: #22c55e; box-shadow: 0 0 8px #22c55e; }

        /* 提词区域 */
        #scroll-container {
            flex: 1;
            overflow-y: auto;
            padding: 40vh 20px 50vh 20px;
            scroll-behavior: auto;
            position: relative;
            z-index: 10;
            cursor: grab;
        }
        #scroll-container:active {
            cursor: grabbing;
        }
        
        #content {
            font-size: 36px;
            line-height: 1.6;
            outline: none;
            white-space: pre-wrap;
            text-align: justify;
            will-change: transform;
        }
        
        /* 编辑模式样式 */
        #content[contenteditable="true"] {
            border: 1px dashed var(--border-dashed);
            padding: 10px;
            background: var(--edit-bg);
            min-height: 300px;
        }

        /* 视觉辅助线 (红线) */
        .guide-line {
            position: fixed;
            top: 35%;
            left: 0;
            width: 100%;
            height: 2px;
            background: var(--guide-line);
            z-index: 20;
            pointer-events: none;
        }
        .guide-line::after {
            content: "👁️ 视线区";
            position: absolute;
            right: 10px;
            top: -20px;
            color: var(--guide-text);
            font-size: 12px;
        }

        /* 底部控制栏 */
        .controls-wrapper {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 100;
            background: var(--panel-bg);
            border-top: 1px solid var(--border-dashed);
            transition: transform 0.3s ease;
        }

        .controls-wrapper.collapsed {
            transform: translateY(100%);
        }

        /* 主按钮区 */
        .main-actions {
            display: flex;
            padding: 15px;
            gap: 10px;
            align-items: center;
        }

        .btn {
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .btn-primary { background: var(--accent); color: white; flex: 2; }
        .btn-danger { background: var(--danger); color: white; flex: 2; }
        .btn-icon { background: var(--btn-icon-bg); color: var(--btn-icon-color); flex: 1; }
        
        /* 设置面板 */
        .settings-panel {
            padding: 0 20px 20px 20px;
            display: none;
            animation: slideUp 0.2s;
        }
        .settings-panel.show { display: block; }

        .setting-row {
            margin-top: 15px;
        }
        .setting-label {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--setting-label);
            margin-bottom: 8px;
        }
        
        /* 优化滑块 */
        input[type=range] {
            width: 100%;
            height: 6px;
            background: var(--range-bg);
            border-radius: 3px;
            outline: none;
            -webkit-appearance: none;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--range-thumb);
            border-radius: 50%;
        }

        /* 镜像模式 */
        .mirror { transform: scaleX(-1); }

        /* 浮动显隐按钮 */
        .toggle-ui-btn {
            position: fixed;
            bottom: max(20px, env(safe-area-inset-bottom));
            right: max(20px, env(safe-area-inset-right));
            background: var(--floater-bg);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 90;
            backdrop-filter: blur(4px);
        }

        /* ========== 右侧极简控制区（隐藏后显示） ========== */
        .right-controls {
            position: fixed;
            right: max(8px, env(safe-area-inset-right));
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 80;
            opacity: 0.3;
            transition: opacity 0.3s;
        }
        .right-controls:active, .right-controls:hover {
            opacity: 0.85;
        }

        /* 播放/暂停按钮 */
        .right-play-btn {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: var(--right-btn-bg);
            color: var(--text);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            transition: background 0.2s;
        }
        .right-play-btn:active {
            background: var(--right-btn-active);
        }

        /* 速度条包装 */
        .speed-track-wrapper {
            position: relative;
            height: 180px;
            display: flex;
            align-items: center;
        }
        .speed-track {
            width: 3px;
            height: 180px;
            background: var(--speed-track-bg);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }
        .speed-thumb {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 14px;
            height: 14px;
            background: var(--speed-thumb);
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(0,0,0,0.5);
            bottom: 0;
            pointer-events: none;
            transition: bottom 0.05s linear;
        }
        .speed-tooltip {
            position: absolute;
            right: 22px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--tooltip-bg);
            color: #fff;
            font-size: 12px;
            padding: 3px 8px;
            border-radius: 4px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        .right-controls:active .speed-tooltip,
        .right-controls:hover .speed-tooltip {
            opacity: 1;
        }

        /* ========== 横屏适配 ========== */
        @media (orientation: landscape) {
            #scroll-container {
                padding: 15vh 40px 20vh 40px;
            }
            
            #content {
                line-height: 1.5;
            }
            
            .guide-line {
                top: 40%;
            }
            
            .right-controls {
                right: max(12px, env(safe-area-inset-right));
                gap: 15px;
            }
            
            .speed-track-wrapper, .speed-track {
                height: 120px;
            }
            
            .right-play-btn {
                width: 38px;
                height: 38px;
                font-size: 16px;
            }
            
            header {
                padding: 6px 20px;
                padding-top: max(6px, env(safe-area-inset-top));
            }
            
            .main-actions {
                padding: 10px 20px;
            }
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<header id="header">
    <div class="brand">
        <div class="status-dot" id="statusDot"></div>
        <span>AI 提词器</span>
    </div>
    <button class="btn" style="background:none; color:var(--accent); font-size:14px;" onclick="toggleEdit()" id="editBtn">
        ✏️ 编辑文本
    </button>
</header>

<div class="guide-line"></div>

<div id="scroll-container">
    <div id="content" contenteditable="false">
这里是手机端优化的声控提词器。

1. 点击底部的【开始监听】。
2. 允许麦克风权限。
3. 保持屏幕常亮，无需担心息屏。

当你说话时，文字会自动上滑。
当你停顿时，文字会悬停等待。

点击右上角【编辑文本】可修改内容。
点击右下角【⚙️】可调节字号和速度。

适合：短视频录制、直播带货、移动演讲。
    </div>
</div>

<!-- 唤醒菜单的浮窗按钮 (当菜单隐藏时显示) -->
<div class="toggle-ui-btn" onclick="toggleControls()" style="display:none;" id="floater">
    ⚙️
</div>

<!-- 右侧极简控制区（控制面板隐藏后出现）：暂停/播放 + 速度条 -->
<div class="right-controls" id="rightControls" style="display:none;">
    <button class="right-play-btn" id="rightPlayBtn" onclick="togglePause()">⏸</button>
    <div class="speed-track-wrapper">
        <div class="speed-tooltip" id="speedTooltip">3.0</div>
        <div class="speed-track" id="speedTrack">
            <div class="speed-thumb" id="speedThumb"></div>
        </div>
    </div>
</div>

<div class="controls-wrapper" id="controls">
    <!-- 设置面板 -->
    <div class="settings-panel" id="settings">
        <div class="setting-row">
            <div class="setting-label"><span>字体大小</span> <span id="fontVal">36px</span></div>
            <input type="range" min="20" max="200" value="36" oninput="updateFont(this.value)">
        </div>
        <div class="setting-row">
            <div class="setting-label"><span>滚动速度</span> <span id="speedVal">3.0</span></div>
            <input type="range" min="0.1" max="20" step="0.1" value="3" id="speedRange" oninput="updateSpeedUI(this.value)">
        </div>
        <div class="setting-row">
            <div class="setting-label"><span>声控灵敏度</span> <span id="sensVal">10.0</span></div>
            <input type="range" min="0" max="100" step="0.1" value="10" id="sensRange" oninput="document.getElementById('sensVal').innerText = parseFloat(this.value).toFixed(1)">
        </div>
        <div class="setting-row" style="display:flex; gap:10px; margin-top:20px; flex-wrap:wrap;">
            <button class="btn btn-icon" onclick="toggleMirror()">镜像翻转</button>
            <button class="btn btn-icon" onclick="resetText()">重置位置</button>
            <button class="btn btn-icon" onclick="toggleTheme()" id="themeBtn">☀️ 白底</button>
            <button class="btn btn-icon" onclick="toggleOrientation()" id="orientBtn">📱 横屏</button>
            <button class="btn btn-icon" onclick="toggleMode()" id="modeBtn">🔄 自动模式</button>
        </div>
    </div>

    <!-- 主按钮 -->
    <div class="main-actions">
        <button class="btn btn-icon" onclick="toggleSettings()">⚙️ 设置</button>
        <button class="btn btn-primary" id="micBtn" onclick="toggleMic()">🎤 开始监听</button>
        <button class="btn btn-icon" onclick="hideControls()">🔽 隐藏</button>
    </div>
</div>

<script>
    // 状态变量
    let isRunning = false;
    let isEditing = false;
    let isPaused = false;
    let isLightMode = false;
    let isLandscapeLocked = false;
    let isAutoMode = false;
    let autoScrollId = null;
    let wakeLock = null;
    let audioContext, analyser, microphone, scriptProcessor;

    // 自动模式专用：transform 偏移量（支持亚像素）
    let autoOffsetY = 0;

    // 自动模式手动拖拽
    let isDraggingContent = false;

    // DOM 元素
    const content = document.getElementById('content');
    const container = document.getElementById('scroll-container');
    const micBtn = document.getElementById('micBtn');
    const statusDot = document.getElementById('statusDot');
    const settingsPanel = document.getElementById('settings');
    const controlsWrapper = document.getElementById('controls');
    const floater = document.getElementById('floater');
    const editBtn = document.getElementById('editBtn');
    const themeBtn = document.getElementById('themeBtn');
    const orientBtn = document.getElementById('orientBtn');
    const modeBtn = document.getElementById('modeBtn');
    const speedRange = document.getElementById('speedRange');
    const speedVal = document.getElementById('speedVal');
    const rightControls = document.getElementById('rightControls');
    const rightPlayBtn = document.getElementById('rightPlayBtn');
    const speedTrack = document.getElementById('speedTrack');
    const speedThumb = document.getElementById('speedThumb');
    const speedTooltip = document.getElementById('speedTooltip');

    // 速度参数（自动模式上限3，声控模式上限20）
    const SPEED_MIN = 0.1;
    const SPEED_MAX_MIC = 20;
    const SPEED_MAX_AUTO = 3;

    function getSpeedMax() {
        return isAutoMode ? SPEED_MAX_AUTO : SPEED_MAX_MIC;
    }

    // ========== 全屏 API ==========
    async function enterFullscreen() {
        const el = document.documentElement;
        try {
            if (el.requestFullscreen) await el.requestFullscreen();
            else if (el.webkitRequestFullscreen) await el.webkitRequestFullscreen();
            else if (el.msRequestFullscreen) await el.msRequestFullscreen();
        } catch (e) {
            console.log('全屏请求失败（需用户手势）:', e);
        }
    }

    async function exitFullscreen() {
        try {
            if (document.exitFullscreen) await document.exitFullscreen();
            else if (document.webkitExitFullscreen) await document.webkitExitFullscreen();
            else if (document.msExitFullscreen) await document.msExitFullscreen();
        } catch (e) {
            console.log('退出全屏失败:', e);
        }
    }

    // ========== 主题切换 ==========
    function toggleTheme() {
        isLightMode = !isLightMode;
        document.body.classList.toggle('light-mode', isLightMode);
        themeBtn.innerText = isLightMode ? '🌙 黑底' : '☀️ 白底';
    }

    // ========== 横屏切换 ==========
    async function toggleOrientation() {
        try {
            if (!isLandscapeLocked) {
                await screen.orientation.lock('landscape');
                isLandscapeLocked = true;
                orientBtn.innerText = '📱 竖屏';
            } else {
                await screen.orientation.unlock();
                isLandscapeLocked = false;
                orientBtn.innerText = '📱 横屏';
            }
        } catch (err) {
            alert('您的浏览器不支持屏幕方向锁定，请手动旋转手机并锁定方向。');
            console.error(err);
        }
    }

    if (screen.orientation) {
        screen.orientation.addEventListener('change', () => {
            const isLandscape = screen.orientation.type.includes('landscape');
            if (!isLandscape && isLandscapeLocked) {
                isLandscapeLocked = false;
                orientBtn.innerText = '📱 横屏';
            }
        });
    }

    window.addEventListener('beforeunload', () => {
        if (isLandscapeLocked && screen.orientation) {
            screen.orientation.unlock();
        }
    });

    // ========== 声控 / 自动 模式切换（修复：位置同步，避免跳跃） ==========
    function toggleMode() {
        if (isRunning) {
            if (isAutoMode) stopAuto();
            else stopMic();
        }
        
        // 模式切换时同步位置，避免视觉跳跃
        if (isAutoMode) {
            // 从自动切回声控：将 transform 偏移同步给原生 scrollTop
            container.scrollTop = Math.round(autoOffsetY);
            content.style.transform = '';
            autoOffsetY = 0;
        } else {
            // 从声控切回自动：将原生 scrollTop 读入 transform
            autoOffsetY = container.scrollTop;
            content.style.transform = `translateY(${-autoOffsetY}px)`;
            container.scrollTop = 0;
        }
        
        isAutoMode = !isAutoMode;
        modeBtn.innerText = isAutoMode ? '🎤 声控模式' : '🔄 自动模式';

        // 动态调整速度范围：自动模式 0.1~3（步进0.05），声控模式 0.1~20（步进0.1）
        const newMax = getSpeedMax();
        const newStep = isAutoMode ? 0.05 : 0.1;
        speedRange.max = newMax;
        speedRange.step = newStep;

        let currentVal = parseFloat(speedRange.value);
        if (currentVal > newMax) {
            currentVal = newMax;
            speedRange.value = currentVal;
            updateSpeedUI(currentVal);
        }

        micBtn.innerText = isRunning ? '⏹ 停止' : (isAutoMode ? '▶ 开始播放' : '🎤 开始监听');
    }

    // ========== 自动播放逻辑（使用 transform 实现亚像素丝滑滚动） ==========
    function startAuto() {
        isRunning = true;
        micBtn.innerText = "⏹ 停止";
        micBtn.className = "btn btn-danger";
        statusDot.classList.add('active');
        requestWakeLock();

        let lastTime = performance.now();

        function loop(now) {
            if (!isRunning || !isAutoMode) return;
            if (!isPaused && !isDraggingContent) {
                const dt = (now - lastTime) / 16.667; // 归一化到 60fps 基准
                const speed = parseFloat(speedRange.value);
                autoOffsetY += speed * dt;
                content.style.transform = `translateY(${-autoOffsetY}px)`;
            }
            lastTime = now;
            autoScrollId = requestAnimationFrame(loop);
        }
        autoScrollId = requestAnimationFrame(loop);
    }

    function stopAuto() {
        isRunning = false;
        if (autoScrollId) cancelAnimationFrame(autoScrollId);
        autoScrollId = null;
        micBtn.innerText = isAutoMode ? '▶ 开始播放' : '🎤 开始监听';
        micBtn.className = "btn btn-primary";
        statusDot.classList.remove('active');
        if (wakeLock) {
            wakeLock.release();
            wakeLock = null;
        }
    }

    // ========== 自动模式：手动拖拽字幕调整位置（原生滚动体验） ==========
    function handleContentDragStart(clientY) {
        if (!isAutoMode || isEditing || isDraggingContent) return;
        isDraggingContent = true;
        
        // 把当前视觉位置转交给浏览器原生滚动
        const syncOffset = Math.round(autoOffsetY);
        container.scrollTop = syncOffset;
        autoOffsetY = syncOffset;
        content.style.transform = 'translateY(0px)';
    }

    function handleContentDragMove(clientY) {
        // 浏览器原生滚动接管，享受惯性/橡皮筋，JS 不干预
    }

    function handleContentDragEnd() {
        if (!isDraggingContent) return;
        isDraggingContent = false;
        
        const newScrollTop = container.scrollTop;
        autoOffsetY = newScrollTop;
        
        // 恢复 transform 驱动，清零 scrollTop 避免双重偏移
        content.style.transform = `translateY(${-autoOffsetY}px)`;
        container.scrollTop = 0;
    }

    // 触摸事件（passive: true 不阻止默认行为，让浏览器原生滚动）
    container.addEventListener('touchstart', (e) => {
        handleContentDragStart(e.touches[0].clientY);
    }, { passive: true });

    container.addEventListener('touchmove', (e) => {
        handleContentDragMove(e.touches[0].clientY);
    }, { passive: true });

    container.addEventListener('touchend', handleContentDragEnd);
    container.addEventListener('touchcancel', handleContentDragEnd);

    // 鼠标事件（桌面端调试）
    container.addEventListener('mousedown', (e) => {
        handleContentDragStart(e.clientY);
    });

    container.addEventListener('mousemove', (e) => {
        handleContentDragMove(e.clientY);
    });

    container.addEventListener('mouseup', handleContentDragEnd);
    container.addEventListener('mouseleave', handleContentDragEnd);

    // 1. 屏幕常亮 (Wake Lock API)
    async function requestWakeLock() {
        try {
            if ('wakeLock' in navigator) {
                wakeLock = await navigator.wakeLock.request('screen');
                console.log('屏幕常亮已激活');
                wakeLock.addEventListener('release', () => {
                    console.log('屏幕常亮已释放');
                });
            }
        } catch (err) {
            console.log('Wake Lock 失败:', err);
        }
    }

    // 页面可见性改变时重新申请 Wake Lock (例如切后台回来)
    document.addEventListener('visibilitychange', async () => {
        if (wakeLock !== null && document.visibilityState === 'visible') {
            await requestWakeLock();
        }
    });

    // 2. 编辑模式切换（优化：保持当前滚动位置，不跳回开头）
    function toggleEdit() {
        isEditing = !isEditing;
        content.contentEditable = isEditing;
        
        if (isEditing) {
            editBtn.innerText = "✅ 完成";
            editBtn.style.color = "#22c55e";
            const currentScroll = container.scrollTop;
            content.focus();
            requestAnimationFrame(() => {
                container.scrollTop = currentScroll;
            });
            if (isRunning) toggleMic();
        } else {
            editBtn.innerText = "✏️ 编辑文本";
            editBtn.style.color = "var(--accent)";
        }
    }

    // 3. 界面交互
    function updateFont(val) {
        content.style.fontSize = val + 'px';
        document.getElementById('fontVal').innerText = val + 'px';
    }

    function updateSpeedUI(val) {
        const v = parseFloat(val);
        const decimals = isAutoMode ? 2 : 1;
        speedVal.innerText = v.toFixed(decimals);
        updateRightThumb(v);
    }

    function toggleSettings() {
        settingsPanel.classList.toggle('show');
    }

    function hideControls() {
        controlsWrapper.classList.add('collapsed');
        floater.style.display = 'flex';
        document.getElementById('header').style.transform = 'translateY(-100%)';
        rightControls.style.display = 'flex';
        updateRightThumb(parseFloat(speedRange.value));
        enterFullscreen();
    }

    function toggleControls() {
        controlsWrapper.classList.remove('collapsed');
        floater.style.display = 'none';
        document.getElementById('header').style.transform = 'translateY(0)';
        rightControls.style.display = 'none';
        exitFullscreen();
    }

    function toggleMirror() {
        container.classList.toggle('mirror');
    }
    
    function resetText() {
        container.scrollTo({ top: 0, behavior: 'smooth' });
        if (isAutoMode) {
            autoOffsetY = 0;
            content.style.transform = 'translateY(0px)';
        }
    }

    // 4. 暂停/播放控制（对声控和自动模式均生效）
    function togglePause() {
        isPaused = !isPaused;
        rightPlayBtn.innerText = isPaused ? '▶' : '⏸';
    }

    // 5. 右侧极简速度条交互
    function updateRightThumb(val) {
        const max = getSpeedMax();
        const ratio = (val - SPEED_MIN) / (max - SPEED_MIN);
        const percent = Math.max(0, Math.min(100, ratio * 100));
        speedThumb.style.bottom = percent + '%';
        const decimals = isAutoMode ? 2 : 1;
        speedTooltip.innerText = parseFloat(val).toFixed(decimals);
    }

    function getSpeedFromY(clientY) {
        const rect = speedTrack.getBoundingClientRect();
        const trackHeight = rect.height;
        const relativeY = clientY - rect.top;
        let ratio = 1 - (relativeY / trackHeight);
        ratio = Math.max(0, Math.min(1, ratio));
        const max = getSpeedMax();
        return SPEED_MIN + ratio * (max - SPEED_MIN);
    }

    let isDraggingSpeed = false;

    function handleSpeedDrag(clientY) {
        const newSpeed = getSpeedFromY(clientY);
        const step = isAutoMode ? 0.05 : 0.1;
        const quantized = Math.round(newSpeed / step) * step;
        const finalVal = Math.max(SPEED_MIN, Math.min(getSpeedMax(), quantized));
        speedRange.value = finalVal;
        updateSpeedUI(finalVal);
    }

    speedTrack.addEventListener('mousedown', (e) => {
        isDraggingSpeed = true;
        handleSpeedDrag(e.clientY);
    });
    document.addEventListener('mousemove', (e) => {
        if (isDraggingSpeed) handleSpeedDrag(e.clientY);
    });
    document.addEventListener('mouseup', () => {
        isDraggingSpeed = false;
    });

    speedTrack.addEventListener('touchstart', (e) => {
        isDraggingSpeed = true;
        handleSpeedDrag(e.touches[0].clientY);
        e.preventDefault();
    }, { passive: false });
    document.addEventListener('touchmove', (e) => {
        if (isDraggingSpeed) {
            handleSpeedDrag(e.touches[0].clientY);
            e.preventDefault();
        }
    }, { passive: false });
    document.addEventListener('touchend', () => {
        isDraggingSpeed = false;
    });

    // 6. 核心入口：根据当前模式分发到声控或自动播放
    async function toggleMic() {
        if (isRunning) {
            if (isAutoMode) stopAuto();
            else stopMic();
        } else {
            if (isAutoMode) startAuto();
            else await startMic();
        }
    }

    // 7. 声控逻辑（原有功能完全保留，仍使用 scrollBy）
    async function startMic() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            microphone = audioContext.createMediaStreamSource(stream);
            scriptProcessor = audioContext.createScriptProcessor(2048, 1, 1);

            analyser.smoothingTimeConstant = 0.3;
            analyser.fftSize = 512;

            microphone.connect(analyser);
            analyser.connect(scriptProcessor);
            scriptProcessor.connect(audioContext.destination);

            scriptProcessor.onaudioprocess = function() {
                const array = new Uint8Array(analyser.frequencyBinCount);
                analyser.getByteFrequencyData(array);
                
                let values = 0;
                for (let i = 0; i < array.length; i++) values += array[i];
                const average = values / array.length;

                const threshold = parseFloat(document.getElementById('sensRange').value);
                const speed = parseFloat(speedRange.value);

                if (average > threshold && !isPaused) {
                    container.scrollBy(0, speed);
                }
            };

            isRunning = true;
            micBtn.innerText = "⏹ 停止";
            micBtn.className = "btn btn-danger";
            statusDot.classList.add('active');
            
            requestWakeLock();

        } catch (err) {
            alert("无法启动麦克风。\n注意：手机浏览器通常要求使用 HTTPS 协议或 localhost 才能调用麦克风。");
            console.error(err);
        }
    }

    function stopMic() {
        if (audioContext) audioContext.close();
        if (microphone) microphone.disconnect();
        if (scriptProcessor) scriptProcessor.disconnect();
        
        isRunning = false;
        micBtn.innerText = isAutoMode ? '▶ 开始播放' : '🎤 开始监听';
        micBtn.className = "btn btn-primary";
        statusDot.classList.remove('active');
        
        if (wakeLock) {
            wakeLock.release();
            wakeLock = null;
        }
    }
</script>
</body>
</html>
